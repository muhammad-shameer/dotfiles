source = /home/$USER/.cache/wal/colors-hyprland.conf
$wallpaper = /home/$USER/.config/wallpapers/vibrant-train.jpg

# Horizontal display (PIN entry)
background {
    monitor = HDMI-A-1
    path = $wallpaper
    blur_size = 3
    blur_passes = 1
    brightness = .6
}

input-field {
    monitor = HDMI-A-1
    size = 16%, 4%
    outline_thickness = 2
    dots_rounding = 4
    dots_spacing = .5
    dots_fase_time = 300
    # inner_color = $backgroundCol
    # outer_color = $backgroundCol $backgroundCol
    inner_color = rgba(20, 20, 20, 0.20)
    outer_color = rgba(20, 20, 20, 0.35)
    check_color = $backgroundCol $backgroundCol
    fail_color = $backgroundCol $backgroundCol
    font_color = $color9
    font_family = FiraCode Nerd Font
    fade_on_empty = false
    shadow_color = rgba(0,0,0,0.5)
    shadow_passes = 2
    shadow_size = 2
    rounding = 20
    placeholder_text = <i></i>
    fail_text = <b>FAIL</b>
    fail_timeout = 300
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor = HDMI-A-1
    text = <i>Hello</i> <b>$USER</b>
    color = $color5
    font_size = 18
    font_family = FiraCode Nerd Font
    shadow_passes = 0
    shadow_size = 4
    halign = left
    valign = top
    position = 30, -15
}

background {
    monitor = HDMI-A-1
    path = $wallpaper
    blur_size = 3
    blur_passes = 1
    brightness = .6
}

label {
    monitor = HDMI-A-1
    text = cmd[update:1000] date +"<b>%I</b><br/><b>%M</b>"
    color = $color6
    font_size = 100
    font_family = FiraCode Nerd Font
    shadow_passes = 0
    shadow_size = 5
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor = HDMI-A-1
    text = cmd[update:1000] date +"<b>%A, %B %d, %Y</b>"
    color = $color4
    font_size = 18
    font_family = FiraCode Nerd Font
    shadow_passes = 0
    shadow_size = 4
    position = -30, -15
    halign = right
    valign = top
}

